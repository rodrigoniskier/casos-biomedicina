<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação Final de Hemograma</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para compilar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .checklist-checkbox { width: 1.25rem; height: 1.25rem; accent-color: #2563eb; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const checklistData = [
            {
                id: 1, title: "1. Identificação da amostra",
                items: ["Nome do paciente confere.", "Idade e sexo compatíveis.", "Data e hora da coleta.", "Data da análise.", "Tipo de amostra correto (EDTA).", "Tempo entre coleta e processamento aceitável."]
            },
            {
                id: 2, title: "2. Controle de qualidade",
                items: ["Controle interno do equipamento aprovado.", "Equipamento sem alarmes.", "Calibração dentro da validade.", "Não houve intercorrências durante a rotina."]
            },
            {
                id: 3, title: "3. Integridade da amostra",
                items: ["Sem coágulos.", "Sem hemólise significativa.", "Volume adequado.", "Homogeneização adequada.", "Ausência de lipemia extrema que possa interferir."]
            },
            {
                id: 4, title: "4. Consistência da série vermelha (Verificação e Cálculos)",
                items: ["Hemácias", "Hemoglobina", "Hematócrito", "VCM", "HCM", "CHCM", "RDW verificado"],
                hasCalculator: true
            },
            {
                id: 5, title: "5. Plausibilidade dos índices eritrocitários",
                items: ["Microcitose: VCM baixo esperado com HCM baixo.", "Normocitose: VCM normal.", "Macrocitose: VCM elevado esperado com RDW aumentado."]
            },
            {
                id: 6, title: "6. Série branca (Verificação e Diferencial)",
                items: ["Leucócitos totais conferidos.", "Soma percentual do diferencial = 100%.", "Soma absoluta compatível com a global."],
                hasWhiteCellCalc: true
            },
            {
                id: 7, title: "7. Flags do equipamento",
                items: ["Sem Blastos", "Sem Linfócitos atípicos", "Sem IG (Imature Granulocytes)", "Sem Left shift (Desvio à esquerda)", "Sem NRBC (Eritroblastos)", "Sem Giant platelets (Plaquetas gigantes)", "Sem Agregados", "Sem Suspeita de células imaturas", "Revisão microscópica realizada (se flags positivos)"]
            },
            {
                id: 8, title: "8. Revisão do estiraço (Sempre que indicado)",
                items: ["Morfologia eritrocitária (Policromasia, Hipocromia, Anisocitose, Poiquilocitose, Esquizócitos, Drepanócitos, Esferócitos, Eliptócitos, Alvo, Inclusões)", "Série branca (Desvio à esquerda, Bastonetes, Blastos, Atipias, Granulações tóxicas, Vacuolização, Corpúsculos de Döhle)", "Plaquetas (Estimativa compatível, Macroplaquetas, Agregados, Satelitismo)"]
            },
            {
                id: 9, title: "9. Plaquetas",
                items: ["Contagem verificada.", "MPV verificado.", "PDW verificado.", "Ausência de agregação (Se houver: Contagem automática pode estar falsa)."]
            },
            {
                id: 10, title: "10. Correlação clínica",
                items: ["Resultados fazem sentido para idade e sexo.", "Resultados fazem sentido para o histórico.", "Mudanças abruptas justificadas (ex: evento clínico grave ou erro pré-analítico)."]
            },
            {
                id: 11, title: "11. Delta Check",
                items: ["Hb comparada com exames anteriores.", "Ht comparado com exames anteriores.", "Leucócitos comparados.", "Plaquetas comparadas.", "Mudanças incompatíveis enviadas para repetição."]
            },
            {
                id: 12, title: "12. Consistência fisiológica",
                items: ["Sem anemia grave sem reticulocitose esperada.", "Sem leucocitose extrema sem alterações morfológicas.", "Sem plaquetopenia severa com agregados.", "Sem CHCM impossível.", "Sem hematócrito incompatível.", "Sem leucopenia extrema sem flags."]
            },
            {
                id: 13, title: "13. Possíveis interferentes investigados",
                items: ["Aglutininas frias", "Hemólise", "Lipemia", "Hiperbilirrubinemia", "Crioglobulinas", "EDTA dependente", "Coleta difícil / Garroteamento prolongado", "Transporte inadequado"]
            },
            {
                id: 14, title: "14. Necessidade de repetição (Repetido se necessário)",
                items: ["Resultado crítico inesperado.", "Inconsistência matemática.", "Flags importantes.", "Discrepância com microscopia.", "Suspeita pré-analítica ou analítica."]
            },
            {
                id: 15, title: "15. Resultado crítico",
                items: ["Confirmado conforme protocolo do laboratório (Hb muito baixa, Leucócitos elevados, Neutropenia grave, Plaquetas críticas).", "Repetido antes de liberar."]
            },
            {
                id: 16, title: "16. Comentário técnico",
                items: ["Observações inseridas (Agregados, hemólise, revisão, blastos, etc.)."]
            },
            {
                id: 17, title: "17. Decisão final (Antes da assinatura)",
                items: ["Todas as relações matemáticas conferem.", "Não existem inconsistências fisiológicas.", "Flags foram investigados.", "Estiraço revisado quando indicado.", "Controle de qualidade aprovado.", "Resultado compatível com a clínica e delta check.", "Nenhuma interferência pré-analítica relevante.", "Comentários inseridos.", "Exame liberado com segurança."]
            }
        ];

        const RedCellCalculator = () => {
            const [rbc, setRbc] = useState('');
            const [vcm, setVcm] = useState('');
            const [hcm, setHcm] = useState('');
            const [hb, setHb] = useState('');
            const [ht, setHt] = useState('');

            const calcHt = rbc && vcm ? ((parseFloat(rbc) * parseFloat(vcm)) / 10).toFixed(1) : '-';
            const calcHb = rbc && hcm ? ((parseFloat(rbc) * parseFloat(hcm)) / 10).toFixed(1) : '-';
            const chcm = hb && ht ? ((parseFloat(hb) / parseFloat(ht)) * 100).toFixed(1) : '-';
            
            const isChcmHigh = chcm !== '-' && parseFloat(chcm) > 37;

            return (
                <div className="mt-4 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                    <h4 className="font-bold text-blue-800 mb-3 text-sm uppercase">Calculadora de Relações Matemáticas</h4>
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">
                        <div>
                            <label className="block text-xs text-slate-500">Hemácias (milhões)</label>
                            <input type="number" step="0.01" value={rbc} onChange={e => setRbc(e.target.value)} className="w-full p-1 border rounded text-sm" placeholder="Ex: 5.0" />
                        </div>
                        <div>
                            <label className="block text-xs text-slate-500">VCM (fL)</label>
                            <input type="number" step="0.1" value={vcm} onChange={e => setVcm(e.target.value)} className="w-full p-1 border rounded text-sm" placeholder="Ex: 90" />
                        </div>
                        <div>
                            <label className="block text-xs text-slate-500">HCM (pg)</label>
                            <input type="number" step="0.1" value={hcm} onChange={e => setHcm(e.target.value)} className="w-full p-1 border rounded text-sm" placeholder="Ex: 30" />
                        </div>
                        <div>
                            <label className="block text-xs text-slate-500">Hb (g/dL) Lida</label>
                            <input type="number" step="0.1" value={hb} onChange={e => setHb(e.target.value)} className="w-full p-1 border rounded text-sm" placeholder="Ex: 15" />
                        </div>
                        <div>
                            <label className="block text-xs text-slate-500">Ht (%) Lido</label>
                            <input type="number" step="0.1" value={ht} onChange={e => setHt(e.target.value)} className="w-full p-1 border rounded text-sm" placeholder="Ex: 45" />
                        </div>
                    </div>
                    
                    <div className="bg-white p-3 rounded shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                        <div>
                            <span className="block text-xs text-slate-500">Ht Esperado (Hemácias × VCM / 10)</span>
                            <strong className="text-slate-800">{calcHt}%</strong>
                        </div>
                        <div>
                            <span className="block text-xs text-slate-500">Hb Esperada (Hemácias × HCM / 10)</span>
                            <strong className="text-slate-800">{calcHb} g/dL</strong>
                        </div>
                        <div className={`p-2 rounded ${isChcmHigh ? 'bg-red-100 text-red-800 border border-red-300' : 'bg-green-50 text-green-800 border border-green-200'}`}>
                            <span className="block text-xs opacity-80">CHCM (Hb/Ht × 100)</span>
                            <strong>{chcm} g/dL</strong>
                            {isChcmHigh && <div className="text-xs font-bold mt-1">⚠️ Investigar: Hemólise, Aglutinação, Lipemia ou Erro Analítico</div>}
                        </div>
                    </div>
                </div>
            );
        };

        const WhiteCellCalculator = () => {
            const [global, setGlobal] = useState('');
            const [neutro, setNeutro] = useState('');
            const [linfo, setLinfo] = useState('');
            const [mono, setMono] = useState('');
            const [eos, setEos] = useState('');
            const [baso, setBaso] = useState('');

            const sum = (parseFloat(neutro||0) + parseFloat(linfo||0) + parseFloat(mono||0) + parseFloat(eos||0) + parseFloat(baso||0)).toFixed(1);
            const isSumValid = parseFloat(sum) === 100;

            const calcAbs = (perc) => global && perc ? Math.round((parseFloat(global) * parseFloat(perc)) / 100) : '-';

            return (
                <div className="mt-4 p-4 bg-slate-100 border border-slate-300 rounded-lg">
                    <h4 className="font-bold text-slate-800 mb-3 text-sm uppercase">Calculadora de Diferencial</h4>
                    <div className="mb-4">
                        <label className="block text-xs font-bold text-slate-700">Leucócitos Totais (/mm³)</label>
                        <input type="number" value={global} onChange={e => setGlobal(e.target.value)} className="w-1/3 p-2 border rounded text-sm" placeholder="Ex: 10000" />
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-3 text-sm">
                        {[['Neutrófilos', neutro, setNeutro], ['Linfócitos', linfo, setLinfo], ['Monócitos', mono, setMono], ['Eosinófilos', eos, setEos], ['Basófilos', baso, setBaso]].map(([label, val, setVal]) => (
                            <div key={label}>
                                <label className="block text-xs text-slate-600">{label} (%)</label>
                                <input type="number" step="0.1" value={val} onChange={e => setVal(e.target.value)} className="w-full p-1 border rounded mb-1" />
                                <div className="text-xs text-slate-500 font-mono bg-white p-1 rounded border">Abs: {calcAbs(val)}</div>
                            </div>
                        ))}
                    </div>
                    <div className={`mt-3 p-2 rounded text-sm font-bold flex justify-between items-center ${isSumValid ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800'}`}>
                        <span>Soma Percentual: {sum}%</span>
                        {!isSumValid && sum > 0 && <span>⚠️ Diferencial não fecha em 100%</span>}
                        {isSumValid && <span>✅ Diferencial Validado</span>}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [checkedState, setCheckedState] = useState({});
            const [totalItems, setTotalItems] = useState(0);

            useEffect(() => {
                let count = 0;
                checklistData.forEach(section => { count += section.items.length; });
                setTotalItems(count);
            }, []);

            const handleCheck = (sectionId, itemIndex) => {
                const key = `${sectionId}-${itemIndex}`;
                setCheckedState(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const completedCount = Object.values(checkedState).filter(Boolean).length;
            const progress = totalItems === 0 ? 0 : Math.round((completedCount / totalItems) * 100);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-6">
                    <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6 sticky top-0 z-10">
                        <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                            🧪 Validação Final de Hemograma
                        </h1>
                        <p className="text-sm text-slate-500 mt-1 mb-4">Protocolo sistemático para decisão e liberação de resultados.</p>
                        
                        <div className="w-full bg-slate-200 rounded-full h-3 mb-1">
                            <div className="bg-blue-600 h-3 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="text-right text-xs font-bold text-blue-700">Progresso: {progress}% ({completedCount}/{totalItems})</div>
                    </header>

                    <div className="space-y-4">
                        {checklistData.map(section => (
                            <section key={section.id} className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                <h2 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2">{section.title}</h2>
                                <ul className="space-y-3">
                                    {section.items.map((item, idx) => {
                                        const isChecked = !!checkedState[`${section.id}-${idx}`];
                                        return (
                                            <li key={idx} className="flex items-start gap-3">
                                                <input 
                                                    type="checkbox" 
                                                    className="checklist-checkbox mt-1"
                                                    checked={isChecked}
                                                    onChange={() => handleCheck(section.id, idx)}
                                                />
                                                <span className={`text-slate-700 leading-tight ${isChecked ? 'line-through opacity-50' : ''}`}>{item}</span>
                                            </li>
                                        );
                                    })}
                                </ul>
                                {section.hasCalculator && <RedCellCalculator />}
                                {section.hasWhiteCellCalc && <WhiteCellCalculator />}
                            </section>
                        ))}
                    </div>

                    <div className="mt-8 bg-slate-800 text-white p-6 rounded-xl shadow-md">
                        <h3 className="text-xl font-bold mb-4 flex items-center gap-2">💡 Regra Prática de Validação</h3>
                        <ol className="list-decimal list-inside space-y-2 text-slate-200 text-sm md:text-base">
                            <li>O equipamento aprovou a análise?</li>
                            <li>Os índices hematimétricos são matematicamente consistentes?</li>
                            <li>Há coerência fisiopatológica entre todos os parâmetros?</li>
                            <li>Existem flags ou alterações que exigem revisão microscópica?</li>
                            <li>Os achados microscópicos confirmam a análise automatizada?</li>
                            <li>Há concordância com o histórico clínico e com o delta check?</li>
                            <li>Há alguma interferência pré ou analítica que comprometa o resultado?</li>
                        </ol>
                        <button 
                            className="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded transition-colors"
                            onClick={() => {
                                if(progress === 100) alert("Laudo verificado. Liberação segura autorizada.");
                                else alert(`Atenção: Apenas ${progress}% do checklist foi concluído. Revise as pendências antes de liberar.`);
                            }}
                        >
                            Assinar e Liberar Hemograma
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
